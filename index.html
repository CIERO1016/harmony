<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harmonies 1〜4人（自作版）</title>
<link rel="stylesheet" href="styles.css?v=13">
<div id="app">
  <header>
    <h1>Harmonies <span class="sub">1〜4人（自作版）</span></h1>
    <div class="header-actions">
      <button id="btn-new">新規ゲーム</button>
      <button id="btn-rules" class="ghost">遊び方</button>
    </div>
  </header>

  <main>
    <!-- 左：個人ボード -->
    <section class="panel board-panel">
      <div class="panel-title" id="board-title">個人ボード</div>
      <div id="board-tabs" class="board-tabs"></div>
      <div id="board-wrap">
        <svg id="board" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div id="hint" class="hint"></div>
    </section>

    <!-- 右：操作エリア -->
    <aside class="side">
      <section class="panel">
        <div class="panel-title" id="central-title">中央ボード</div>
        <div id="central" class="central"></div>
        <div class="turn-controls">
          <div id="hand-label" class="hand-label">手札：なし</div>
          <div id="hand" class="hand"></div>
          <button id="btn-endturn" disabled>ターン終了 → 補充</button>
        </div>
      </section>

      <section class="panel" id="spirit-panel">
        <div class="panel-title">自然の精霊カード</div>
        <div id="spirit"></div>
      </section>

      <section class="panel">
        <div class="panel-title" id="animals-title">動物カード</div>
        <div id="animals-market" class="animals"></div>
        <div class="panel-subtitle" id="owned-label">自分の動物カード（最大4枚）</div>
        <div id="animals-owned" class="animals owned"></div>
      </section>

      <section class="panel">
        <div class="panel-title">得点</div>
        <div id="score" class="score"></div>
      </section>
    </aside>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <button id="modal-close" class="modal-close">×</button>
      <div id="modal-content"></div>
    </div>
  </div>
</div>
<script src="game.js?v=13"></script>
